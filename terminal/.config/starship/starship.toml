"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

# =============================================================================
# Core System & Git
# =============================================================================

[directory]
# пҒј  (Folder icon)
format = '\[[пҒј $path]($style)\]'
style = "bold blue"

[cmd_duration]
min_time = 2000
# уұҺ«  (Timer icon)
format = '\[[уұҺ« $duration]($style)\]'
style = "bold yellow"

[git_branch]
symbol = "п„Ұ "
format = '\[[$symbol$branch]($style)\]'
style = "bold purple"

[git_commit]
# пҗ—  (Git commit icon)
format = '\[[пҗ— \($hash$tag\)]($style)\]'

[git_state]
format = '\[[$state ($progress_current/$progress_total)]($style)\]'

[git_status]
format = '([\[$all_status$ahead_behind\]]($style))'

[hostname]
# у°’Ӣ  (Server/Display icon for SSH sessions)
ssh_symbol = "у°’Ӣ "
format = '\[[$ssh_symbol$hostname]($style)\]'
style = "bold green"

[username]
# пҖҮ  (User icon)
format = '\[[пҖҮ $user]($style)\]'
disabled = false
show_always = true

[time]
disabled = false
# пҖ—  (Clock icon)
format = '\[[пҖ— $time]($style)\]'
time_format = "%R"
utc_time_offset = "local"

# =============================================================================
# Languages & Tools
# =============================================================================

[c]
symbol = "оҳқ "
format = '\[[$symbol($version(-$name))]($style)\]'

[cpp]
symbol = "оҳқ "
format = '\[[$symbol($version(-$name))]($style)\]'

[cmake]
symbol = "оһ” "
format = '\[[$symbol($version)]($style)\]'

[java]
symbol = "оү– "
format = '\[[$symbol($version)]($style)\]'

[nodejs]
symbol = "оңҳ "
format = '\[[$symbol($version)]($style)\]'

[php]
symbol = "оҳҲ "
format = '\[[$symbol($version)]($style)\]'

[python]
symbol = "оҲө "
format = '\[[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style)\]'

[lua]
symbol = "оҳ  "
format = '\[[$symbol($version)]($style)\]'

[package]
symbol = "у°Ҹ— "
format = '\[[$symbol$version]($style)\]'


[rust]
symbol = "уұҳ— "
format = '\[[$symbol($version)]($style)\]'
