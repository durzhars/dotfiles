# MODIFIERS
$mainMod = SUPER

# PROGRAMS
$terminal = kitty
$fileManager = dolphin
$browser = brave
$screenshot = ~/.config/hypr/scripts/screenshot.sh
$btop = kitty -e btop
$ipc = qs -c noctalia-shell ipc call

# 1. APPLICATIONS
bind = $mainMod, E, exec, $fileManager #"Open File Manager"
bind = $mainMod, B, exec, $browser #"Open Browser"
bind = $mainMod, return, exec, $terminal #"Open Terminal"
bind = $mainMod SHIFT, return, exec, [float; size 800 600; center;] $terminal #"Floating Terminal"
bind = $mainMod SHIFT, S, exec, $screenshot #"Region Screenshot"
bind = $mainMod SHIFT, B, exec, [float; size 750 490; move 15 55; no_initial_focus;] $btop #"Btop++"

# 2. SYSTEM & SHELL
bind = $mainMod, D, exec, $ipc launcher toggle #"App Launcher"
bind = $mainMod, S, exec, $ipc controlCenter toggle #"Control Center"
bind = $mainMod, X, exec, $ipc settings toggle #"Settings"
bind = $mainMod, M, exec, $ipc lockScreen lock #"Lock Screen"
bind = $mainMod, W, exec, $ipc wallpaper toggle #"Wallpaper Selector"
bind = $mainMod SHIFT, P, exec, $ipc sessionMenu toggle #"Session Menu"
bind = $mainMod SHIFT, G, exec, $ipc plugin:custom-commands toggle #"Animation Toggles"

# 3. MEDIA & SYSTEM CONTROLS
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase #"Volume Up"
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease #"Volume Down"
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase #"Brightness Up"
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease #"Brightness Down"
bindel = , XF86AudioMute, exec, $ipc media playPause #"Play/Pause Media"
bindel = , XF86AudioNext, exec, $ipc media next #"Next Track"
bindel = , XF86AudioPrev, exec, $ipc media previous #"Previous Track"
bindel = $mainMod, O, exec, $ipc media next #"Next Track"
bindel = $mainMod, I, exec, $ipc media previous #"Previous Track"

# 4. WINDOW MANAGEMENT
bind = $mainMod, Q, killactive, #"Close Window"
bind = $mainMod, P, pseudo, #"Toggle Pseudo (Dwindle)"
#bind = $mainMod, M, layoutmsg, togglemaster #"Toggle Master Layout"
bind = $mainMod, J, layoutmsg, togglesplit #"Toggle Split (Dwindle)"
bind = $mainMod, Y, layoutmsg, togglescrolling #"Toggle Scrolling"
bind = $mainMod, SPACE, togglefloating #"Toggle Floating"
bind = $mainMod, F, fullscreen, 1 #"Toggle Fullscreen (Maximize)"
bind = $mainMod SHIFT, F, fullscreenstate, 2, 0 #"Toggle Fullscreen (True)"

bind = $mainMod, left, movefocus, l #"Focus Left"
bind = $mainMod, right, movefocus, r #"Focus Right"
bind = $mainMod, up, movefocus, u #"Focus Up"
bind = $mainMod, down, movefocus, d #"Focus Down"

bind = $mainMod, l, movefocus, l #"Focus Left"
bind = $mainMod, h, movefocus, r #"Focus Right"
bind = $mainMod, k, movefocus, u #"Focus Up"
bind = $mainMod, j, movefocus, d #"Focus Down"


bind = $mainMod SHIFT, left, swapwindow, l #"Swap Window Left"
bind = $mainMod SHIFT, right, swapwindow, r #"Swap Window Right"
bind = $mainMod SHIFT, up, swapwindow, u #"Swap Window Up"
bind = $mainMod SHIFT, down, swapwindow, d #"Swap Window Down"

bind = $mainMod CTRL, left, movewindow, l #"Move Window Left"
bind = $mainMod CTRL, right, movewindow, r #"Move Window Right"
bind = $mainMod CTRL, up, movewindow, u #"Move Window Up"
bind = $mainMod CTRL, down, movewindow, d #"Move Window Down"

bindm = $mainMod, mouse:272, movewindow #"Drag Window"
bindm = $mainMod, mouse:273, resizewindow 2 #"Drag Resize Window"
binde = $mainMod, bracketright, resizeactive, 20 0 #"Expand Window Right"
binde = $mainMod, bracketleft, resizeactive, -20 0 #"Shrink Window Left"

# 5. WORKSPACES
binds {
  workspace_back_and_forth = true
}

bind = $mainMod, 1, workspace, 1 #"Workspace 1 - 10"
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1 #"Move to Workspace 1 - 10"
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod CTRL, 1, movetoworkspacesilent, 1 #"Silent Move to Workspace 1 - 10"
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

bind = $mainMod, mouse_down, workspace, e+1 #"Next Workspace (Scroll)"
bind = $mainMod, mouse_up, workspace, e-1 #"Prev Workspace (Scroll)"

bind = $mainMod, period, workspace, r+1 #"Next Workspace"
bind = $mainMod, comma, workspace, r-1 #"Prev Workspace"

bind = $mainMod SHIFT, period, movetoworkspace, r+1 #"Move to Next Workspace"
bind = $mainMod SHIFT, comma, movetoworkspace, r-1 #"Move to Prev Workspace"

bind = $mainMod, tab, workspace, e+1 #"Next Workspace (Tab)"

# 6. RESIZE SUBMAP
bind = $mainMod, R, submap, resize #"Enter Resize Mode"

# Start a submap called "resize".
submap = resize

# Set repeatable binds for resizing the active window.
binde = , right, resizeactive, 10 0 #"Resize Right"
binde = , left, resizeactive, -10 0 #"Resize Left"
binde = , up, resizeactive, 0 -10 #"Resize Up"
binde = , down, resizeactive, 0 10 #"Resize Down"

# Use `reset` to go back to the global submap
bind = , catchall, submap, reset #"Exit Resize Mode"

# Reset the submap, which will return to the global submap
submap = reset
